x-airflow-common: &airflow-common
  image: gov-rag-airflow:2.9.0
  build:
    context: .
    dockerfile: crawler/Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    PYTHONPATH: /opt/airflow/src
    ARXIV_OAI_BASE_URL: ${ARXIV_OAI_BASE_URL:-https://oaipmh.arxiv.org/oai}
    ARXIV_METADATA_PREFIX: ${ARXIV_METADATA_PREFIX:-arXiv}
    ARXIV_SET_SPEC: ${ARXIV_SET_SPEC:-cs}
    ARXIV_REQUEST_DELAY: ${ARXIV_REQUEST_DELAY:-3}
    HTTP_TIMEOUT: ${HTTP_TIMEOUT:-120}
    HTTP_CHUNK_SIZE: ${HTTP_CHUNK_SIZE:-8192}
    QDRANT_HOST: qdrant
    QDRANT_PORT: ${QDRANT_PORT:-6333}
    QDRANT_COLLECTION: ${QDRANT_COLLECTION:-arxiv_cs_papers}
    EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
    INGEST_BATCH_SIZE: ${INGEST_BATCH_SIZE:-64}
    HF_HOME: /opt/airflow/data/hf_cache
  volumes:
    - ./crawler/dags:/opt/airflow/dags
    - ./crawler/src:/opt/airflow/src
    - ./ingestion:/ingestion
    - ./shared:/shared
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@admin.com
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
