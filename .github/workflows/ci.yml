name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e "./shared[infra]" -e ./ingestion -e ./rag
          pip install -r crawler/requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy shared/src/shared ingestion/src/ingestion rag/src/rag
        env:
          MYPYPATH: shared/src:ingestion/src:rag/src

      - name: Tests
        run: pytest
